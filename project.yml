name: QianqianDiary
options:
  bundleIdPrefix: com.glowmoment
  deploymentTarget:
    iOS: "16.0"

packages:
  Popovers:
    url: https://github.com/aheze/Popovers
    from: 1.3.2
  DGCharts:
    url: https://github.com/danielgindi/Charts.git
    from: 5.1.0

targets:
  QianqianDiary:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources
    dependencies:
      - package: Popovers
      - package: DGCharts

    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.glowmoment.qianqiandiary
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_STYLE: Automatic
      GENERATE_INFOPLIST_FILE: YES
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"
      INFOPLIST_KEY_CFBundleDisplayName: "QianqianDiary"
      INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
      INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
      SWIFT_VERSION: "5.9"
      INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "允许访问相册以选择您的愿景图片"
      INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "允许将愿景分享卡片保存至相册"
      INFOPLIST_KEY_NSCameraUsageDescription: "允许使用相机拍摄您的愿景图片"
